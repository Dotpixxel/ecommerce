<?xml version="1.0" encoding="UTF-8"?>
<svg width="400" height="100" viewBox="0 0 400 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style type="text/css">
      @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@300;900&amp;display=swap');
      .logo-icon-bg { fill: black; }
      .logo-icon-text { fill: white; font-family: 'Playfair Display', serif; font-weight: 900; font-size: 50px; text-anchor: middle; dominant-baseline: central; }
      .logo-text-raunk { fill: black; font-family: 'Playfair Display', serif; font-weight: 900; font-size: 32px; text-transform: uppercase; letter-spacing: 0.25em; }
      .logo-text-butik { fill: #666; font-family: 'Playfair Display', serif; font-weight: 300; font-size: 32px; text-transform: uppercase; letter-spacing: 0.25em; }
    </style>
  </defs>
  
  <!-- Icon Box -->
  <rect x="20" y="20" width="60" height="60" class="logo-icon-bg" />
  <text x="50" y="53" class="logo-icon-text">R</text>
  
  <!-- Text -->
  <text x="100" y="60">
    <tspan class="logo-text-raunk">RAUNK</tspan>
    <tspan x="225" class="logo-text-butik">BUTIK</tspan>
  </text>
</svg>
